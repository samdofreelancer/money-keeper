apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: money-keeper-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: money-keeper-backend-service
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: money-keeper-frontend-service
            port:
              number: 80
