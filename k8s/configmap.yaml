apiVersion: v1
kind: ConfigMap
metadata:
  name: money-keeper-config
  namespace: money-keeper
data:
  # Backend configuration
  SPRING_PROFILES_ACTIVE: "k8s"
  SERVER_PORT: "8080"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://money-keeper.local"
  
  # Database configuration
  SPRING_DATASOURCE_URL: "jdbc:oracle:thin:@oracle-service:1521:xe"
  SPRING_DATASOURCE_USERNAME: "moneykeeper"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.Oracle12cDialect"
  
  # Frontend configuration
  VITE_API_BASE_URL: "http://money-keeper-backend-service:8080"
  VITE_APP_TITLE: "Money Keeper"
