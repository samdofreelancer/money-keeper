apiVersion: apps/v1
kind: Deployment
metadata:
  name: money-keeper-frontend
  namespace: money-keeper
  labels:
    app: money-keeper-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: money-keeper-frontend
  template:
    metadata:
      labels:
        app: money-keeper-frontend
    spec:
      containers:
      - name: frontend
        image: money-keeper-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: money-keeper-config
              key: VITE_API_BASE_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
