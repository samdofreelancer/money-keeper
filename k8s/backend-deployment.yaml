apiVersion: apps/v1
kind: Deployment
metadata:
  name: money-keeper-backend
  namespace: money-keeper
  labels:
    app: money-keeper-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: money-keeper-backend
  template:
    metadata:
      labels:
        app: money-keeper-backend
    spec:
      serviceAccountName: default
      containers:
      - name: backend
        image: ghcr.io/samdofreelancer/money-keeper-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "ci"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:oracle:thin:@oracle:1521/XEPDB1"
        - name: SPRING_DATASOURCE_USERNAME
          value: "system"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: oracle-secret
              key: password
        - name: ORACLE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: oracle-secret
              key: password
        - name: SPRING_FLYWAY_ENABLED
          value: "false"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: money-keeper-backend-service
  namespace: money-keeper
spec:
  selector:
    app: money-keeper-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
