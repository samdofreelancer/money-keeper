apiVersion: apps/v1
kind: Deployment
metadata:
  name: money-keeper-backend
  labels:
    app: money-keeper-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: money-keeper-backend
  template:
    metadata:
      labels:
        app: money-keeper-backend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: backend
        image: ghcr.io/samdofreelancer/money-keeper-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: money-keeper-backend-service
spec:
  selector:
    app: money-keeper-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
