apiVersion: apps/v1
kind: Deployment
metadata:
  name: money-keeper-backend
  namespace: money-keeper
  labels:
    app: money-keeper-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: money-keeper-backend
  template:
    metadata:
      labels:
        app: money-keeper-backend
    spec:
      containers:
      - name: backend
        image: money-keeper-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: money-keeper-config
              key: SPRING_PROFILES_ACTIVE
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: money-keeper-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: money-keeper-config
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: money-keeper-secrets
              key: oracle-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: money-keeper-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
