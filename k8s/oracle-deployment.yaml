apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: oracle
  namespace: money-keeper
spec:
  serviceName: oracle-service
  replicas: 1
  selector:
    matchLabels:
      app: oracle
  template:
    metadata:
      labels:
        app: oracle
    spec:
      containers:
      - name: oracle
        image: gvenzl/oracle-xe:21-slim
        ports:
        - containerPort: 1521
          name: oracle
        env:
        - name: ORACLE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: money-keeper-secrets
              key: oracle-system-password
        - name: ORACLE_DATABASE
          value: "xe"
        - name: APP_USER
          value: "moneykeeper"
        - name: APP_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: money-keeper-secrets
              key: oracle-password
        volumeMounts:
        - name: oracle-data
          mountPath: /opt/oracle/oradata
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: oracle-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: oracle-service
  namespace: money-keeper
spec:
  selector:
    app: oracle
  ports:
  - port: 1521
    targetPort: 1521
    name: oracle
  type: ClusterIP
