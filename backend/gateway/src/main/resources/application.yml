server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: money-keeper-core
          uri: lb://money-keeper-core
          predicates:
            - Path=/api/accounts/**, /api/categories/**, /api/currencies/**, /api/settings/**, /api/exchange-rates/**
        - id: tax-service
          uri: lb://tax-service
          predicates:
            - Path=/api/tax/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ["*"]
            allowedMethods: ["*"]
            allowedHeaders: ["*"]
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,routefuncs,prometheus
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
    routes:
      enabled: true
  info:
    build:
      enabled: true
    app:
      enabled: true
    os:
      enabled: true
    java:
      enabled: true
    git:
      enabled: true
      mode: full

logging:
  level:
    com.personal.money.management: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
    root: INFO
