server:
  port: 8081

spring:
  application:
    name: money-keeper-core
  datasource:
    url: jdbc:h2:mem:finance_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      path: /h2-console
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: CORE
    locations: classpath:db/migration/h2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.personal.money.management: DEBUG
    root: INFO

# Exchange rates provider
exchangerates:
  api:
    url: https://api.exchangeratesapi.io/v1/latest
    key: REPLACE_WITH_YOUR_API_KEY
