# This properties file is for CI environment only.
# Database credentials are injected via environment variables.
# DO NOT hardcode passwords in this file for security reasons.

spring.datasource.url=jdbc:oracle:thin:@localhost:1522/XEPDB1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=system
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.Oracle12cDialect
spring.flyway.enabled=false
spring.flyway.locations=db/migration/oracle
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=CORE

# Exchange rates provider
exchangerates.api.url=https://api.exchangeratesapi.io/v1/latest
exchangerates.api.key=REPLACE_WITH_YOUR_API_KEY