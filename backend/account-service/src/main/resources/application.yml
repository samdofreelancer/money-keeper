server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:oracle:thin:@oracle:1521/XEPDB1
    username: ACCOUNT
    password: ${ORACLE_PASSWORD:password}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    url: jdbc:oracle:thin:@oracle:1521/XEPDB1
    user: ACCOUNT
    password: ${ORACLE_PASSWORD:password}
    schemas: ACCOUNT
    baseline-on-migrate: true
    locations: classpath:db/migration/oracle/account

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
