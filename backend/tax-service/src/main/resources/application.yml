server:
  port: 8082

spring:
  application:
    name: tax-service
  datasource:
    url: jdbc:oracle:thin:@oracle:1521/XEPDB1
    username: system
    password: ${ORACLE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  info:
    build:
      enabled: true
    app:
      enabled: true
    os:
      enabled: true
    java:
      enabled: true
    git:
      enabled: true
      mode: full

logging:
  level:
    com.personal.money.management: DEBUG
    root: INFO
