# CI Profile - Oracle Database
spring.profiles.active=ci

# Oracle Database Configuration
spring.datasource.url=jdbc:oracle:thin:@oracle:1521/XEPDB1
spring.datasource.driverClassName=oracle.jdbc.OracleDriver
spring.datasource.username=${ORACLE_USERNAME:system}
spring.datasource.password=${ORACLE_PASSWORD:oracle}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/oracle
spring.flyway.baselineOnMigrate=true
spring.flyway.user=${ORACLE_USERNAME:system}
spring.flyway.password=${ORACLE_PASSWORD:oracle}

# Logging
logging.level.root=WARN
logging.level.com.personal.money.management.tax=INFO
