# Production Profile - Oracle Database
spring.profiles.active=prod

# Oracle Database Configuration
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@oracle:1521/XEPDB1}
spring.datasource.driverClassName=oracle.jdbc.OracleDriver
spring.datasource.username=${DB_USERNAME:system}
spring.datasource.password=${DB_PASSWORD:oracle}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/oracle
spring.flyway.baselineOnMigrate=false

# Logging - Production should have minimal logging
logging.level.root=WARN
logging.level.com.personal.money.management.tax=WARN

# Server
server.port=8082
server.servlet.context-path=/api

# OpenAPI/Swagger - Disable in production
springdoc.swagger-ui.enabled=false
