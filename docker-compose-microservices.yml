version: '3.8'

services:
  eureka-server:
    build: ./backend/eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - moneykeeper-net

  account-service:
    build: ./backend/account-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - oracle-db
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - ORACLE_PASSWORD=money123
    networks:
      - moneykeeper-net

  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    environment:
      - ORACLE_PWD=money123
    ports:
      - "1521:1521"
    networks:
      - moneykeeper-net

networks:
  moneykeeper-net:
    driver: bridge

