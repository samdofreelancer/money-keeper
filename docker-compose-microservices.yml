version: '3.8'

services:
  eureka-server:
    build: ./backend/eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - moneykeeper-net

  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    environment:
      - ORACLE_PWD=money123
    ports:
      - "1521:1521"
    networks:
      - moneykeeper-net

networks:
  moneykeeper-net:
    driver: bridge
