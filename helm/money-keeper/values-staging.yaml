# Staging environment overrides
global:
  environment: staging
  namespace: default

frontend:
  replicaCount: 2
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "300m"
  hpa:
    minReplicas: 2
    maxReplicas: 5

backend:
  replicaCount: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "300m"
  hpa:
    minReplicas: 2
    maxReplicas: 5
