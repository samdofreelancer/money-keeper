# Production environment overrides
global:
  environment: production
  namespace: default

frontend:
  replicaCount: 3
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10

backend:
  replicaCount: 3
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
