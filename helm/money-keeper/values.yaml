# Default values for money-keeper Helm chart

# Helm chart overrides
nameOverride: ""
fullnameOverride: ""

# Global settings
global:
  environment: staging
  namespace: default
  imagePullSecrets:
    - name: ghcr-pull-secret

# Frontend configuration
frontend:
  enabled: true
  name: money-keeper-frontend-v2

  image:
    registry: ghcr.io
    repository: samdofreelancer/money-keeper-frontend
    tag: "1.0.0"
    pullPolicy: Always

  replicaCount: 3

  service:
    type: ClusterIP
    port: 80
    targetPort: 80
    annotations: {}

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80

  pdb:
    enabled: true
    minAvailable: 2

  podAntiAffinity: true

  env:
    NODE_ENV: production

  envFrom: []

  secretEnv:
    VITE_API_URL: BACKEND_API_URL

# Backend configuration
backend:
  enabled: true
  name: money-keeper-backend-v2

  image:
    registry: ghcr.io
    repository: samdofreelancer/money-keeper-backend
    tag: "1.0.0"
    pullPolicy: Always

  replicaCount: 3

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations: {}

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: http
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 75
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 85

  pdb:
    enabled: true
    minAvailable: 2

  podAntiAffinity: true

  initContainer:
    enabled: true
    name: flyway-migration
    command: []

  env:
    SPRING_PROFILES_ACTIVE: production
    SPRING_FLYWAY_ENABLED: "false"

  envFrom: []

  secretEnv:
    SPRING_DATASOURCE_URL: DATABASE_URL
    SPRING_DATASOURCE_USERNAME: DB_USERNAME
    SPRING_DATASOURCE_PASSWORD: DB_PASSWORD

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Labels applied to all resources
labels:
  managed-by: blue-green-deployment
  version: v2
