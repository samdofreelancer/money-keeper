name: Setup Java and Maven
description: Set up a JDK and Maven dependency cache for backend CI jobs.

inputs:
  java-version:
    description: Java version to install.
    required: false
    default: '17'
  distribution:
    description: Java distribution to install.
    required: false
    default: temurin
  working-directory:
    description: Directory containing the Maven pom.xml.
    required: false
    default: backend

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: ${{ inputs.distribution }}
        java-version: ${{ inputs.java-version }}
        cache: maven
        cache-dependency-path: ${{ inputs.working-directory }}/pom.xml

    - name: Validate Java and Maven
      shell: bash
      run: |
        java -version
        mvn -version
