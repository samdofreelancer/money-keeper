name: eslint-wrapper

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'playwright-code-gen/**'

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}-eslint
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  eslint-wrapper:
    uses: samdofreelancer/cloud-workflow/.github/workflows/eslint.yml@main
    with:
      node-version: '20'
      working-directory: 'playwright-code-gen'

