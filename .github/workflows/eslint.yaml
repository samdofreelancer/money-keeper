name: eslint-wrapper

on:
  pull_request:
    branches: [develop]  
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'playwright-code-gen/**/*.ts'
  workflow_dispatch: {}

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}-eslint
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  call-eslint:
    if: ${{ !github.event.pull_request.draft }} # Skip if the PR is a draft
    uses: samdofreelancer/cloud-workflow/.github/workflows/eslint.yml@main
    with:
      node-version: '20'
      working-directory: 'playwright-code-gen'

