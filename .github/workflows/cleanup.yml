name: Cleanup Resources

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string

env:
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
  GKE_ZONE: ${{ vars.GKE_ZONE }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup GCP
        uses: ./.github/actions/setup-gcp
        with:
          cluster: ${{ env.GKE_CLUSTER }}
          zone: ${{ env.GKE_ZONE }}
          credentials: ${{ secrets.GCP_SA_KEY }}

      - name: Delete frontend deployment
        run: kubectl delete -f frontend-deploy.yaml

      - name: Stop ngrok and backend
        run: |
          pkill ngrok
          docker stop backend oracle
          docker rm backend oracle