name: playwright-code-gen Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  playwright-code-gen-test:
    name: Run playwright-code-gen Tests
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: ci
      REGISTRY: ghcr.io/${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.sha }}
      VITE_BACKEND_HOST: backend
      ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Start Oracle service
        run: ORACLE_PASSWORD=${{ secrets.ORACLE_PASSWORD_SECRET }} docker compose up -d oracle

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: playwright-code-gen/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('playwright-code-gen/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install playwright-code-gen dependencies
        run: npm install
        working-directory: ./playwright-code-gen

      - name: Run lint check and stop on error
        run: npm run lint
        working-directory: ./playwright-code-gen

      - name: Run Flyway migration with retries
        run: |
          ORACLE_PASSWORD=${{ secrets.ORACLE_PASSWORD_SECRET }} docker compose up flyway
        env:
          SPRING_DATASOURCE_URL: jdbc:oracle:thin:@localhost:1522/XEPDB1
          
      - name: Start Backend and Frontend containers
        run: docker compose up -d backend frontend

      - name: Wait for Backend to be healthy
        run: |
          echo "Waiting for Backend to be healthy..."
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for Backend..."
            sleep 10
          done

      - name: Wait for Frontend to be healthy
        run: |
          echo "Waiting for Frontend to be healthy..."
          for i in {1..30}; do
            if curl -f http://localhost:5173; then
              echo "Frontend is healthy"
              break
            fi
            echo "Waiting for Frontend..."
            sleep 10
          done

      - name: Run playwright-code-gen tests
        run: docker compose run --rm -e GITHUB_REF=${{ github.event.pull_request.head.ref || github.ref }} -e GITHUB_SHA=${{ github.event.pull_request.head.sha || github.sha }} -e GITHUB_REPOSITORY=${{ github.repository }} -e BASE_URL=http://frontend:5173 -e API_BASE_URL=http://backend:8080/api playwright-code-gen npm run test:ci

      - name: Generate Allure report
        if: always()
        run: docker compose run --rm playwright-code-gen npm run allure:generate
        working-directory: ./

      - name: Upload Allure report for Github Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'playwright-code-gen/test-results/allure-report'
          name: github-pages
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: List files in deployed artifact
        if: always()
        run: |
          echo "Files in playwright-code-gen/test-results/allure-report:"
          ls -la playwright-code-gen/test-results/allure-report/

      - name: Stop containers
        if: always()
        run: docker compose down
