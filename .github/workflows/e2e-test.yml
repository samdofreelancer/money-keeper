name: playwright-code-gen Tests

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'playwright-code-gen/**'
  pull_request:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'playwright-code-gen/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  playwright-code-gen-test:
    name: Run playwright-code-gen Tests
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: ci
      REGISTRY: ghcr.io/${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.sha }}
      VITE_BACKEND_HOST: backend
      ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Start Oracle service
        run: ORACLE_PASSWORD=${{ secrets.ORACLE_PASSWORD_SECRET }} docker compose up -d oracle

      # Run Flyway migration with retries for reliability
      - name: Run Flyway migration with retries
        run: |
          for i in {1..3}; do
            echo "Attempt $i: Running Flyway migration..."
            if ORACLE_PASSWORD=${{ secrets.ORACLE_PASSWORD_SECRET }} docker compose up flyway; then
              echo "Flyway migration succeeded"
              break
            else
              echo "Flyway migration failed, retrying..."
              sleep 5
            fi
          done
          if [ $i -eq 4 ]; then
            echo "Flyway migration failed after 3 attempts"
            exit 1
          fi
        env:
          SPRING_DATASOURCE_URL: jdbc:oracle:thin:@localhost:1522/XEPDB1
          
      - name: Start Backend and Frontend containers
        run: docker compose up -d backend frontend

      # Wait for Backend to be healthy with timeout and error handling
      - name: Wait for Backend to be healthy
        run: |
          echo "Waiting for Backend to be healthy..."
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for Backend... ($i/30)"
            sleep 10
          done
          if ! curl -f http://localhost:8080/actuator/health; then
            echo "Backend failed to become healthy within 5 minutes"
            exit 1
          fi

      # Wait for Frontend to be healthy with timeout and error handling
      - name: Wait for Frontend to be healthy
        run: |
          echo "Waiting for Frontend to be healthy..."
          for i in {1..30}; do
            if curl -f http://localhost:5173; then
              echo "Frontend is healthy"
              break
            fi
            echo "Waiting for Frontend... ($i/30)"
            sleep 10
          done
          if ! curl -f http://localhost:5173; then
            echo "Frontend failed to become healthy within 5 minutes"
            exit 1
          fi

      - name: Run playwright-code-gen tests
        run: docker compose run --rm -e GITHUB_REF=${{ github.event.pull_request.head.ref || github.ref }} -e GITHUB_SHA=${{ github.event.pull_request.head.sha || github.sha }} -e GITHUB_REPOSITORY=${{ github.repository }} -e BASE_URL=http://frontend:5173 -e API_BASE_URL=http://backend:8080/api playwright-code-gen npm run test:ci

      - name: Fix test results permissions
        if: always()
        run: sudo chown -R runner:runner playwright-code-gen/test-results

      # Setup Node.js with caching for performance
      - name: Setup Node.js
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'playwright-code-gen/package-lock.json'

      # Generate Allure report for test results
      - name: Generate Allure report
        if: always()
        run: |
          cd playwright-code-gen
          npm ci
          npm run allure:generate

      - name: Upload Allure report for Github Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'playwright-code-gen/test-results/allure-report'
          name: github-pages
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Clean up containers to free resources
      - name: Stop containers
        if: always()
        run: docker compose down
