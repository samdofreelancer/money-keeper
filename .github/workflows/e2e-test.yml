name: playwright-code-gen Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  playwright-code-gen-test:
    name: Run playwright-code-gen Tests
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: ci
      REGISTRY: ghcr.io/${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.sha }}
      VITE_BACKEND_HOST: backend
      ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD_SECRET }}
      E2E_SOURCE_FOLDER: playwright-code-gen
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Prepare E2E stack
        uses: ./.github/actions/prepare-e2e-stack
        with:
          oracle-password: ${{ secrets.ORACLE_PASSWORD_SECRET }}

      - name: Run playwright-code-gen tests
        uses: ./.github/actions/run-e2e-suite
        with:
          github-ref: ${{ github.event.pull_request.head.ref || github.ref }}
          github-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          github-repository: ${{ github.repository }}

      - name: Check Backend and Frontend logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs backend

          echo "=== Frontend logs ==="
          docker compose logs frontend

      - name: Publish Allure report
        if: always()
        uses: ./.github/actions/publish-allure-report
        with:
          source-folder: ${{ env.E2E_SOURCE_FOLDER }}

      - name: Stop containers
        if: always()
        uses: ./.github/actions/teardown-docker-compose
