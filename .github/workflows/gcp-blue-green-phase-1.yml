name: 'GCP Blue-Green Phase 1: Deploy to CL1'

on:
  workflow_call:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP Project ID'
        required: true
        type: string
      gke_cluster_1:
        description: 'GKE Cluster 1 Name'
        required: true
        type: string
      gke_zone:
        description: 'GKE Cluster Zone'
        required: true
        type: string
      prod_vip_load_balancer:
        description: 'On-Premise Load Balancer Endpoint'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: "${{ github.repository }}-frontend:${{ inputs.version }}"
  BACKEND_IMAGE: "${{ github.repository }}-backend:${{ inputs.version }}"
  HELM_CHART_DIR: helm/money-keeper
  K8S_NAMESPACE: default
  HELM_ENVIRONMENT: production

jobs:
  phase_1:
    name: 'Phase 1️⃣: Isolate CL1 & Deploy V2'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      frontend_deployment_id: ${{ steps.deploy_frontend.outputs.deployment_id }}
      backend_deployment_id: ${{ steps.deploy_backend.outputs.deployment_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup GCP credentials
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v1

      - name: Get GKE Cluster 1 credentials
        run: |
          gcloud container clusters get-credentials ${{ inputs.gke_cluster_1 }} \
            --zone ${{ inputs.gke_zone }} \
            --project ${{ inputs.gcp_project_id }}

      - name: Pre-Deployment Validation
        run: |
          set -e
          echo "🔍 Pre-deployment checks..."

          # Check namespace
          if ! kubectl get namespace ${{ env.K8S_NAMESPACE }} >/dev/null 2>&1; then
            kubectl create namespace ${{ env.K8S_NAMESPACE }}
          fi

          # Verify image pull secret
          if ! kubectl get secret ghcr-pull-secret -n ${{ env.K8S_NAMESPACE }} >/dev/null 2>&1; then
            echo "❌ Image pull secret not found"
            exit 1
          fi

          kubectl get nodes -o wide | head -3
          echo "✅ Pre-deployment checks passed"

      - name: Isolate CL1 from Production
        run: |
          set -e
          echo "🔌 Removing CL1 from on-premise load balancer..."
          
          RESPONSE=$(curl -s -X POST "${{ inputs.prod_vip_load_balancer }}/api/backend/remove" \
            -H "Authorization: Bearer ${{ secrets.ONPREM_LB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"backend_pool":"cl1-backend","cluster":"${{ inputs.gke_cluster_1 }}"}' \
            -w "\n%{http_code}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Failed to remove CL1 from load balancer"
            echo "Response: $BODY"
            exit 1
          fi
          
          echo "✅ CL1 removed from production load balancer pool"
          echo "Response: $BODY"

      - name: Deploy Frontend V2 to CL1
        id: deploy_frontend
        run: |
          set -e
          echo "🚀 Deploying Frontend V2 to CL1..."

          helm template money-keeper ${{ env.HELM_CHART_DIR }} \
            -f ${{ env.HELM_CHART_DIR }}/values-${{ env.HELM_ENVIRONMENT }}.yaml \
            --set frontend.enabled=true \
            --set backend.enabled=false \
            --set frontend.image.tag=${{ inputs.version }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            > frontend-deploy.yaml

          if ! kubectl apply -f frontend-deploy.yaml --dry-run=client -n ${{ env.K8S_NAMESPACE }} >/dev/null 2>&1; then
            echo "❌ Manifest validation failed"
            exit 1
          fi

          if grep -q "{{ " frontend-deploy.yaml; then
            echo "❌ Unreplaced template variables found"
            exit 1
          fi

          kubectl apply -f frontend-deploy.yaml -n ${{ env.K8S_NAMESPACE }}

          if ! kubectl rollout status deployment/money-keeper-frontend-v2 \
            -n ${{ env.K8S_NAMESPACE }} --timeout=5m; then
            kubectl describe deployment money-keeper-frontend-v2 -n ${{ env.K8S_NAMESPACE }}
            kubectl logs -n ${{ env.K8S_NAMESPACE }} -l app=money-keeper-frontend --tail=50
            exit 1
          fi

          DEPLOYMENT_ID=$(kubectl get deployment money-keeper-frontend-v2 \
            -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.metadata.uid}')
          echo "deployment_id=${DEPLOYMENT_ID}" >> $GITHUB_OUTPUT

          READY=$(kubectl get deployment money-keeper-frontend-v2 \
            -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(kubectl get deployment money-keeper-frontend-v2 \
            -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.replicas}')
          echo "✅ Frontend V2 deployed ($READY/$DESIRED replicas)"

      - name: Deploy Backend V2 to CL1
        id: deploy_backend
        run: |
          set -e
          echo "🚀 Deploying Backend V2 to CL1..."

          helm template money-keeper ${{ env.HELM_CHART_DIR }} \
            -f ${{ env.HELM_CHART_DIR }}/values-${{ env.HELM_ENVIRONMENT }}.yaml \
            --set frontend.enabled=false \
            --set backend.enabled=true \
            --set backend.image.tag=${{ inputs.version }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            > backend-deploy.yaml

          if ! kubectl apply -f backend-deploy.yaml --dry-run=client -n ${{ env.K8S_NAMESPACE }} >/dev/null 2>&1; then
            echo "❌ Manifest validation failed"
            exit 1
          fi

          if grep -q "{{ " backend-deploy.yaml; then
            echo "❌ Unreplaced template variables found"
            exit 1
          fi

          kubectl apply -f backend-deploy.yaml -n ${{ env.K8S_NAMESPACE }}

          if ! kubectl rollout status deployment/money-keeper-backend-v2 \
            -n ${{ env.K8S_NAMESPACE }} --timeout=5m; then
            kubectl describe deployment money-keeper-backend-v2 -n ${{ env.K8S_NAMESPACE }}
            kubectl logs -n ${{ env.K8S_NAMESPACE }} -l app=money-keeper-backend --tail=50
            exit 1
          fi

          DEPLOYMENT_ID=$(kubectl get deployment money-keeper-backend-v2 \
            -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.metadata.uid}')
          echo "deployment_id=${DEPLOYMENT_ID}" >> $GITHUB_OUTPUT

          READY=$(kubectl get deployment money-keeper-backend-v2 \
            -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(kubectl get deployment money-keeper-backend-v2 \
            -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.replicas}')
          echo "✅ Backend V2 deployed ($READY/$DESIRED replicas)"

      - name: Configure Test-VIP Proxy
        run: |
          echo "🔧 Configuring Test-VIP proxy..."

          FRONTEND_IP=$(kubectl get svc money-keeper-frontend-v2 -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.clusterIP}')
          BACKEND_IP=$(kubectl get svc money-keeper-backend-v2 -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.clusterIP}')

          echo "Frontend Service IP: ${FRONTEND_IP}"
          echo "Backend Service IP: ${BACKEND_IP}"
          echo "✅ Test-VIP configuration ready"

      - name: Phase 1 Summary
        run: |
          echo "✅ Phase 1 Complete: CL1 deployed and isolated from production"

      - name: Cleanup Deployments on Failure
        if: failure()
        run: |
          echo "❌ Phase 1 failed, cleaning up deployments..."
          kubectl delete deployment money-keeper-frontend-v2 -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl delete deployment money-keeper-backend-v2 -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      - name: Revert Traffic on Failure
        if: failure()
        run: |
          echo "⚠️ Phase 1 failed, re-adding CL1 to load balancer..."
          
          curl -s -X POST "${{ inputs.prod_vip_load_balancer }}/api/backend/add" \
            -H "Authorization: Bearer ${{ secrets.ONPREM_LB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"backend_pool":"cl1-backend","cluster":"${{ inputs.gke_cluster_1 }}"}' \
            || echo "⚠️ Warning: Could not re-add CL1 to load balancer"
