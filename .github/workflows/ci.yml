name: CI

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
  pull_request:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  unit-test:
    name: Unit Tests
    uses: ./.github/workflows/unit-test.yml
    secrets: inherit

  integration-test:
    name: Integration Tests
    uses: ./.github/workflows/integration-test.yml
    secrets: inherit

  analysis:
    name: Code Analysis
    needs:
      - unit-test
      - integration-test
    uses: ./.github/workflows/code-analysis.yml
    secrets: inherit

  e2e-test:
    name: E2E Tests
    needs:
      - unit-test
      - integration-test
    uses: ./.github/workflows/e2e-test.yml
    secrets: inherit
