name: CI (Unit & Integration Tests)

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'

jobs:
  ci:
    uses: samdofreelancer/cloud-workflow/.github/workflows/wf-java-ci.yml@develop
    with:
      working-directory: backend
      java-version: '17'
      artifact-retention-days: 30
    secrets:
      oracle-password: ${{ secrets.ORACLE_PASSWORD_SECRET }}
      sonar-token: ${{ secrets.SONAR_TOKEN }}
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
