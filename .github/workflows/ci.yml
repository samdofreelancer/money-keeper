name: CI (Unit & Integration Tests)

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - '.github/actions/**'
      - '.github/workflows/code-analysis.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/integration-test.yml'
      - '.github/workflows/unit-test.yml'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - '.github/actions/**'
      - '.github/workflows/code-analysis.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/integration-test.yml'
      - '.github/workflows/unit-test.yml'
      - 'docker-compose.yml'

jobs:
  unit-test:
    name: Unit Tests
    uses: ./.github/workflows/unit-test.yml
    secrets: inherit

  integration-test:
    name: Integration Tests
    uses: ./.github/workflows/integration-test.yml
    secrets: inherit

  analysis:
    name: Code Analysis
    needs:
      - unit-test
      - integration-test
    uses: ./.github/workflows/code-analysis.yml
    secrets: inherit
