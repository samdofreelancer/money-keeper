name: Build Images

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
    outputs:
      backend-image:
        value: ${{ jobs.build-images.outputs.backend-image }}
      frontend-image:
        value: ${{ jobs.build-images.outputs.frontend-image }}

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.0
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/money-keeper-backend:${{ env.IMAGE_TAG }}
          outputs: type=registry,ref=${{ env.REGISTRY }}/money-keeper-backend:${{ env.IMAGE_TAG }}

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/money-keeper-frontend:${{ env.IMAGE_TAG }}
          outputs: type=registry,ref=${{ env.REGISTRY }}/money-keeper-frontend:${{ env.IMAGE_TAG }}