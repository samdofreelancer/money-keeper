name: Unit Tests

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - '.github/actions/**'
      - '.github/workflows/unit-test.yml'
  pull_request:
    branches:
      - develop
      - master
    paths:
      - 'backend/**'
      - '.github/actions/**'
      - '.github/workflows/unit-test.yml'

env:
  WORKING_DIRECTORY: backend
  JAVA_VERSION: '17'
  ARTIFACT_RETENTION_DAYS: 30
  SPRING_PROFILES_ACTIVE: ci

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Java toolchain
        uses: ./.github/actions/setup-java-maven
        with:
          java-version: ${{ env.JAVA_VERSION }}
          working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Execute unit test suite
        uses: ./.github/actions/run-maven-tests
        with:
          working-directory: ${{ env.WORKING_DIRECTORY }}
          maven-goal: test
          maven-profile: small-test
          report-directory: target/small-test-reports

      - name: Publish unit test artifacts
        if: always()
        uses: ./.github/actions/upload-test-artifacts
        with:
          test-artifact-name: surefire-report-unit
          test-report-path: ${{ env.WORKING_DIRECTORY }}/target/small-test-reports
          jacoco-artifact-name: jacoco-report-unit
          jacoco-report-path: ${{ env.WORKING_DIRECTORY }}/target/site/jacoco
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
