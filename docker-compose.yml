services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    ports:
      - "1522:1521"
    environment:
      ORACLE_USER: system
      ORACLE_PASSWORD: "${ORACLE_PASSWORD}"
    restart: unless-stopped
    command: bash -c "rm -f /opt/oracle/diag/tnslsnr/*/listener/alert/log.xml && /bin/sh /opt/oracle/scripts/startup/startup.sh"
    healthcheck:
      test: ["CMD-SHELL", "echo select 1 from dual | sqlplus -s system/\"${ORACLE_PASSWORD}\"@localhost:1521/XEPDB1 | grep -q 1"]
      interval: 15s
      timeout: 10s
      retries: 60
    networks:
      - money-keeper-net

  flyway:
    image: flyway/flyway:latest
    depends_on:
      oracle:
        condition: service_healthy
    command: -url=jdbc:oracle:thin:@oracle:1521/XEPDB1 -user=system -password=${ORACLE_PASSWORD} -schemas=CORE -locations=filesystem:/flyway/sql -baselineOnMigrate=false -cleanDisabled=false clean migrate
    restart: on-failure
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
    volumes:
      - ./backend/src/main/resources/db/migration/oracle:/flyway/sql
    networks:
      - money-keeper-net

  eureka-server:
    build:
      context: ./backend
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - money-keeper-net

  money-keeper-core:
    build:
      context: ./backend
      dockerfile: money-keeper-core/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ci
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    restart: unless-stopped
    depends_on:
      flyway:
        condition: service_completed_successfully
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - money-keeper-net

  tax-service:
    build:
      context: ./backend
      dockerfile: tax-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ci
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - money-keeper-net

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ci
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      money-keeper-core:
        condition: service_healthy
      tax-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - money-keeper-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - money-keeper-net

  playwright-code-gen:
    build:
      context: ./playwright-code-gen
      dockerfile: Dockerfile
    volumes:
      - ./playwright-code-gen:/playwright-code-gen
    working_dir: /playwright-code-gen
    depends_on:
      gateway:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - money-keeper-net

networks:
  money-keeper-net:
    driver: bridge
